<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Pronetheia</title>

  <!-- Content Security Policy -->
  <!-- Inter font for Neural Interface -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- 
    Content Security Policy - Secure Configuration
    
    SECURITY: Removed 'unsafe-inline' and 'unsafe-eval' from script-src
    This prevents inline scripts and eval() which are common XSS attack vectors.
    
    Note: This may break some functionality that relies on inline scripts or eval.
    If needed, use nonces or hashes for specific inline scripts instead.
  -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src 'self';
                 style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
                 img-src 'self' data: https: blob:;
                 connect-src 'self' ws: wss: http://192.168.1.120:8000 http://192.168.1.121:8001 http://192.168.1.124:8890 http://192.168.1.128:7880 http://192.168.1.128:7881 http://192.168.1.128:7882 https://*.pronetheia.com https://*.anthropic.com https://*.openai.com;
                 font-src 'self' data: https://fonts.gstatic.com;
                 media-src 'self' blob:;
                 worker-src 'self' blob:;
                 object-src 'none';
                 base-uri 'self';
                 form-action 'self';
                 frame-ancestors 'none';">

  <!-- PWA Meta Tags -->
  <meta name="description" content="AI-Powered Multi-Agent Development Platform" />
  <meta name="theme-color" content="#22c55e" />

  <!-- iOS/Safari PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Pronetheia" />
  <link rel="apple-touch-icon" href="/icon-192.png" />

  <!-- Prevent text selection and callout on long-press (for drag) -->
  <style>
    /* iPad touch optimizations */
    * {
      -webkit-tap-highlight-color: transparent;
    }

    /* Full height chain for proper layout */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overscroll-behavior: none;
      /* Safari 13-15.3 fix for viewport height */
      min-height: -webkit-fill-available;
    }

    /* Safe area for notched devices and status bar */
    #root {
      /* Fallback for older Safari (13-15.3) */
      height: 100%;
      height: -webkit-fill-available;
      /* Modern browsers */
      height: 100dvh;
      /* Use max() to ensure minimum padding even when safe-area is 0 */
      padding-top: max(env(safe-area-inset-top, 0px), 20px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }

    /* iPad Safari-specific: extra top padding for address bar */
    @supports (-webkit-touch-callout: none) {
      #root {
        padding-top: max(env(safe-area-inset-top, 0px), 44px);
      }
    }

    /* Prevent zoom on double-tap */
    html {
      touch-action: manipulation;
    }
  </style>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
